services:
  moto:
    image: motoserver/moto:latest
    ports:
      - "5000:5000"
    environment:
      - MOTO_PORT=5000
    command: ["-H", "0.0.0.0", "-p", "5000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:5000/moto-api/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
